<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Descarte.Tech</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="d-flex align-items-center justify-content-center" style="height: 100vh; background-color: #121212;">

    <div class="card form-card shadow-lg" style="width: 100%; max-width: 400px; background-color: #1a1a1a; border: 1px solid #333;">
        <div class="card-body p-5 text-center">
            
            <h3 class="text-success-neon mb-4">Área ADMIN</h3>
            
            <form id="loginForm">
                <div class="mb-3 text-start">
                    <label class="form-label text-light-gray" style="color: #adb5bd;">Usuário</label>
                    <input type="text" id="userInput" class="form-control custom-input" required>
                </div>
                
                <div class="mb-4 text-start">
                    <label class="form-label text-light-gray" style="color: #adb5bd;">Senha</label>
                    <input type="password" id="passInput" class="form-control custom-input" required>
                </div>
                
                <button type="submit" class="btn custom-btn w-100">Entrar no painel</button>
                
                <p id="errorMsg" class="text-danger mt-3" style="display: none; font-size: 0.9rem;">usuário ou senha incorretos!</p>
            </form>
            
            <a href="index.html" class="text-white d-block mt-4" style="text-decoration: none; font-size: 0.85rem;">Voltar para o site principal</a>
            
        </div>
    </div>

    <script>
        // script para senha 
        document.getElementById('loginForm').addEventListener('submit', function(event) {
            event.preventDefault(); 
            
            const user = document.getElementById('userInput').value;
            const pass = document.getElementById('passInput').value;
        
            if (user === 'admin' && pass === 'admin') {
                window.location.href = 'admin.html';
            } else {
                // se errou, mostra a mensagem vermelha
                document.getElementById('errorMsg').style.display = 'block';
            }
        });
    </script>
</body>
</html>
