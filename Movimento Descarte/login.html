<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Login - Descarte.Tech</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-dark d-flex align-items-center justify-content-center" style="height: 100vh;">

    <div class="card" style="width: 100%; max-width: 400px; padding: 20px;">
        <div class="card-body text-center">
            
            <h3 class="text-success mb-4">Área ADMIN</h3>
            
            <form id="loginForm">
                <div class="mb-3 text-start">
                    <label class="form-label fw-bold">Usuário</label>
                    <input type="text" id="userInput" class="form-control" required>
                </div>
                
                <div class="mb-4 text-start">
                    <label class="form-label fw-bold">Senha</label>
                    <input type="password" id="passInput" class="form-control" required>
                </div>
                
                <button type="submit" class="btn btn-success w-100">Entrar no painel</button>
                
                <p id="errorMsg" class="text-danger mt-3 fw-bold" style="display: none;">Usuário ou senha incorretos!</p>
            </form>
            
            <div class="mt-4">
                <a href="index.html" class="text-secondary">Voltar para o site principal</a>
            </div>
            
        </div>
    </div>

    <script>
        
        document.getElementById('loginForm').addEventListener('submit', function(event) {
            event.preventDefault(); 
            
          
            const user = document.getElementById('userInput').value;
            const pass = document.getElementById('passInput').value;
        
           
            if (user === 'admin' && pass === 'admin') {
                window.location.href = 'admin.html'; // 
            } else {
                a
                document.getElementById('errorMsg').style.display = 'block';
            }
        });
    </script>
</body>
</html>
