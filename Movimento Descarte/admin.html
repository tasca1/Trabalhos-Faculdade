<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Painel Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="wrapper">
        
        <div class="sidebar">
            <div class="text-center py-4 fw-bold fs-4 text-success">
                [Admin]
            </div>
            
            <div class="mt-3">
                <a href="#" id="link-pontos" class="ativo">
                    Pontos de coleta
                </a>
                <a href="#" id="link-mensagens">
                    Mensagens
                </a>
                
                <a href="index.html" class="text-danger mt-5">
                    Sair do painel
                </a>
            </div>
        </div>

        <div class="conteudo-admin">
            
            <nav class="navbar navbar-light bg-white border-bottom px-4 py-3 mb-4">
                <span id="top-title" class="fs-5 fw-bold text-dark">Gerenciar pontos de coleta</span>
            </nav>

            <div id="sec-pontos">
                <div class="alert alert-warning text-center p-5 border-0">
                    <h4 class="alert-heading fw-bold mb-3">Aguardando Pontos de Coleta</h4>
                    <p class="mb-0 text-muted">Nenhum ponto de coleta registrado no sistema.</p>
                </div>
            </div>

            <div id="sec-mensagens" class="d-none">
                <div class="alert alert-info text-center p-5 border-0">
                    <h4 class="alert-heading fw-bold mb-3">Aguardando Mensagens</h4>
                    <p class="mb-0 text-muted">Nada na caixa de mensagens por enquanto.</p>
                </div>
            </div>

        </div>
    </div>

    <script>
        const linkPontos = document.getElementById('link-pontos');
        const linkMensagens = document.getElementById('link-mensagens');
        const secPontos = document.getElementById('sec-pontos');
        const secMensagens = document.getElementById('sec-mensagens');
        const topTitle = document.getElementById('top-title');

        // Lógica quando clica em Pontos de Coleta
        linkPontos.addEventListener('click', function(e) {
            e.preventDefault();
            
            // Mostra pontos, esconde mensagens
            secPontos.classList.remove('d-none');
            secMensagens.classList.add('d-none');
            
            // Muda a cor do menu lateral
            linkPontos.classList.add('ativo');
            linkMensagens.classList.remove('ativo');
            
            // Muda o título lá em cima
            topTitle.innerText = 'Gerenciar pontos de coleta';
        });

        // Lógica quando clica em Mensagens
        linkMensagens.addEventListener('click', function(e) {
            e.preventDefault();
            
            // Mostra mensagens, esconde pontos
            secMensagens.classList.remove('d-none');
            secPontos.classList.add('d-none');
            
            // Muda a cor do menu lateral
            linkMensagens.classList.add('ativo');
            linkPontos.classList.remove('ativo');
            
            // Muda o título lá em cima
            topTitle.innerText = 'Visualizar mensagens';
        });
    </script>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
